services:
  db:
    image: mysql:8.0
    container_name: sql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 270627Vit
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: proekt
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3308:3306"                 # внешний порт для ручного доступа, как раньше
    networks:
      - net

  app:
    build: .                        # путь к твоему Dockerfile (или замени на image: d:d)
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 270627Vit
      DB_NAME: proekt
    depends_on:
      - db
    networks:
      - net
    # ports не нужны — всё через nginx

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "90:90"                     # внешний 90 -> внутренний 90 (соответствует твоему listen)
    depends_on:
      - app
    networks:
      - net

volumes:
  mysql_data:

networks:
  net:
    external: true                  # используем уже существующую сеть "net", а не создаём новую
